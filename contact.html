<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato Nippum</title>
    <link rel="stylesheet" href="css & js/style.css">
    <script src="css & js/script.js"></script>
</head>
<body>
    <header>
        <nav></nav>
    </header>

    <main>
        <h1>Vamos trabalhar juntos.</h1>
        <p>
            Aqui irei fazer uma série de perguntas a respeito do seu projeto, nome e email, a à partir daqui irmos entrar em contato com você 
            e descutir a respeito do seu preço e como ocorrerá a execussão do mesmo.
        </p>
        <div class="box_contact">
            <form action="/submit" method="post"></form>
                <div class="your_name">
                    <label class="client_name" for="nome_do_cliente">Nome*</label>
                    <input type="text" required>
                </div>
                <div class="tel">
                    <label class="client_number" for="numero_de_celular_do_cliente">Número de celular*</label>
                    <input type="number" name="tel_client" id="tel_client">
                </div>
                <div class="email">
                    <label class="client_email" for="email_do_cliente">Email*</label>
                    <input type="email" name="email_client" id="email_client" placeholder="exemplo@gmail.com" required>
                </div>
                <div class="organization">
                    <label class="organization_name" for="nome_da_empresa">Nome da sua organização</label>
                    <input type="text" name="organization_client" id="organization_client">
                </div>
                <div class="about_project">
                    <label class="project_about" for="detalhes_sobre_o_projeto">Conte-nos mais sobre seu projeto.*</label>
                    <textarea name="about_client_project" id="about_client_project" placeholder="Coloque aqui detalhes sobre o seu projeto."></textarea>
                </div>
                <div class="budget-value">
                    <label class="clent_buget" for="orçamento_definido_do_cliente">Orçamento, caso você tenha um.</label>
                    <input type="number" name="value_user" id="value_user" min="500" placeholder="R$2000">
                </div>
                <div class="extra_files">
                    <label class="files_reference" for="arquivos_de_referência">Imagens ou arquivos sobre suas ideas? Compartilhe conosco.</label>
                    <input type="file" name="files_about_project" id="files_about_project" multiple>
                </div>
                <button type="submit">send</button>
            </form>
        </div>
    </main>

    <footer></footer>
</body>
</html>
